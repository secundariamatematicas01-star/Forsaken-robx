<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Asimétrico - Estilo Forsaken</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            color: white;
            font-size: 18px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">Rol: <span id="rol">Sin asignar</span> | Generadores activados: <span id="progreso">0/4</span></div>

    <script>
        // Configuración del juego
        const config = {
            type: Phaser.AUTO,
            width: 1000,
            height: 600,
            backgroundColor: '#2c3e50',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false // Pon en true si quieres ver los límites de colisión
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        // Variables globales
        let jugador;
        let entidad;
        let supervivientes = [];
        let generadores = [];
        let rolActual;
        let generadoresActivados = 0;
        let puertaSalida;
        let teclas;
        let juegoTerminado = false;

        function preload() {
            // Cargamos colores básicos como texturas (puedes cambiar por imágenes después)
            this.load.image('jugador', 'https://via.placeholder.com/30/3498db/ffffff?text=S'); // Superviviente
            this.load.image('entidad', 'https://via.placeholder.com/40/e74c3c/ffffff?text=E'); // Entidad
            this.load.image('generador', 'https://via.placeholder.com/25/f39c12/ffffff?text=G');
            this.load.image('puerta', 'https://via.placeholder.com/50x80/2ecc71/ffffff?text=SALIDA');
            this.load.image('pared', 'https://via.placeholder.com/40/34495e/ffffff');
        }

        function create() {
            // 1. Asignamos rol aleatoriamente (en versión multijugador esto se define por servidor)
            const roles = ['superviviente', 'entidad'];
            rolActual = roles[Math.floor(Math.random() * roles.length)];
            document.getElementById('rol').textContent = rolActual.toUpperCase();

            // 2. Creamos paredes para el mapa
            const paredes = this.physics.add.staticGroup();
            // Bordes
            paredes.create(500, 20, 'pared').setScale(25, 1).refreshBody();
            paredes.create(500, 580, 'pared').setScale(25, 1).refreshBody();
            paredes.create(20, 300, 'pared').setScale(1, 15).refreshBody();
            paredes.create(980, 300, 'pared').setScale(1, 15).refreshBody();
            // Obstáculos internos
            paredes.create(200, 150, 'pared').setScale(3, 1).refreshBody();
            paredes.create(600, 400, 'pared').setScale(1, 4).refreshBody();
            paredes.create(400, 250, 'pared').setScale(2, 1).refreshBody();

            // 3. Creamos generadores (objetivo de supervivientes)
            for (let i = 0; i < 4; i++) {
                let gen = this.physics.add.sprite(150 + i * 200, 120 + i * 80, 'generador');
                gen.activo = false;
                gen.body.immovable = true;
                generadores.push(gen);
            }

            // 4. Puerta de salida (se abre al activar todos los generadores)
            puertaSalida = this.physics.add.sprite(850, 300, 'puerta');
            puertaSalida.body.immovable = true;
            puertaSalida.visible = false;

            // 5. Creamos jugadores según rol
            if (rolActual === 'superviviente') {
                jugador = this.physics.add.sprite(150, 450, 'jugador');
                jugador.setCollideWorldBounds(true);
                jugador.velocidad = 160;

                // Otros supervivientes (simulados)
                for (let i = 0; i < 2; i++) {
                    let sup = this.physics.add.sprite(250 + i * 100, 450, 'jugador');
                    sup.setCollideWorldBounds(true);
                    supervivientes.push(sup);
                }

                // La Entidad (controlada por otro jugador / IA)
                entidad = this.physics.add.sprite(800, 100, 'entidad');
                entidad.setCollideWorldBounds(true);
                entidad.velocidad = 220; // Más rápida que los supervivientes
            } 
            else { // Rol: Entidad
                jugador = this.physics.add.sprite(800, 100, 'entidad');
                jugador.setCollideWorldBounds(true);
                jugador.velocidad = 220;

                // Supervivientes (controlados por otros / IA)
                for (let i = 0; i < 3; i++) {
                    let sup = this.physics.add.sprite(150 + i * 100, 450, 'jugador');
                    sup.setCollideWorldBounds(true);
                    supervivientes.push(sup);
                }
            }

            // 6. Colisiones
            this.physics.add.collider(jugador, paredes);
            this.physics.add.collider(supervivientes, paredes);
            this.physics.add.collider(entidad, paredes);
            this.physics.add.collider(jugador, generadores);
            this.physics.add.collider(jugador, puertaSalida);

            // Colisión Entidad ↔ Superviviente = Captura
            this.physics.add.overlap(entidad, supervivientes, capturarSuperviviente, null, this);
            this.physics.add.overlap(jugador, generadores, interactuarConGenerador, null, this);
            this.physics.add.overlap(jugador, puertaSalida, escaparJuego, null, this);

            // 7. Controles de teclado
            teclas = this.input.keyboard.createCursorKeys();
            // Tecla para interactuar
            this.teclaInteractuar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
        }

        function update() {
            if (juegoTerminado) return;

            // --- MOVIMIENTO SEGÚN ROL ---
            if (rolActual === 'superviviente') {
                // Mover superviviente
                moverJugador(jugador, jugador.velocidad);

                // IA básica de la Entidad (se mueve hacia el jugador)
                if (entidad.x < jugador.x) entidad.x += entidad.velocidad / 60;
                if (entidad.x > jugador.x) entidad.x -= entidad.velocidad / 60;
                if (entidad.y < jugador.y) entidad.y += entidad.velocidad / 60;
                if (entidad.y > jugador.y) entidad.y -= entidad.velocidad / 60;
            } 
            else {
                // Mover Entidad
                moverJugador(jugador, jugador.velocidad);

                // IA básica de supervivientes (huyen de la entidad)
                supervivientes.forEach(sup => {
                    if (sup.x < jugador.x) sup.x -= 2;
                    if (sup.x > jugador.x) sup.x += 2;
                    if (sup.y < jugador.y) sup.y -= 2;
                    if (sup.y > jugador.y) sup.y += 2;
                });
            }
        }

        // Función auxiliar para moverse con flechas
        function moverJugador(pj, velocidad) {
            pj.setVelocity(0);

            if (teclas.left.isDown) pj.setVelocityX(-velocidad);
            if (teclas.right.isDown) pj.setVelocityX(velocidad);
            if (teclas.up.isDown) pj.setVelocityY(-velocidad);
            if (teclas.down.isDown) pj.setVelocityY(velocidad);
        }

        // Interacción: Activar generador
        function interactuarConGenerador(jugador, generador) {
            if (rolActual === 'superviviente' && Phaser.Input.Keyboard.JustDown(this.teclaInteractuar) && !generador.activo) {
                generador.activo = true;
                generador.setTint(0x00ff00); // Cambia de color al activarse
                generadoresActivados++;
                document.getElementById('progreso').textContent = `${generadoresActivados}/4`;

                // Si se activan todos, aparece la puerta
                if (generadoresActivados === 4) {
                    puertaSalida.visible = true;
                }
            }
        }

        // Captura: Entidad atrapa a superviviente
        function capturarSuperviviente(entidad, superviviente) {
            superviviente.destroy();
            const indice = supervivientes.indexOf(superviviente);
            if (indice > -1) supervivientes.splice(indice, 1);

            if (supervivientes.length === 0 && rolActual === 'entidad') {
                finDelJuego("¡GANASTE! Atrapaste a todos los supervivientes 🎉");
            }
        }

        // Escapar: Superviviente llega a la puerta
        function escaparJuego(jugador, puerta) {
            if (rolActual === 'superviviente' && puerta.visible) {
                finDelJuego("¡ESCAPASTE! Ganaste la partida 🎉");
            }
        }

        // Fin del juego
        function finDelJuego(mensaje) {
            juegoTerminado = true;
            this.add.text(300, 250, mensaje, { fontSize: '32px', fill: '#fff', backgroundColor: '#000' });
        }
    </script>
</body>
</html>
